<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zachet.KZ — Платформа взаимозачётов</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:,">
<meta name="theme-color" content="#2563EB">

<style>
:root {
  --blue: #2563EB;
  --blue-light: #3B82F6;
  --blue-pale: #EFF6FF;
  --green: #10B981;
  --green-pale: #ECFDF5;
  --orange: #F59E0B;
  --orange-pale: #FFFBEB;
  --red: #EF4444;
  --red-pale: #FEF2F2;
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --gray-400: #9CA3AF;
  --gray-500: #6B7280;
  --gray-600: #4B5563;
  --gray-700: #374151;
  --gray-800: #1F2937;
  --gray-900: #111827;
  --purple: #8B5CF6;
  --cyan: #06B6D4;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Golos Text', sans-serif;
  background: #0F172A;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.phone-frame {
  width: 390px;
  min-height: 844px;
  background: white;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 0 12px #1E293B, 0 40px 80px rgba(0,0,0,0.6), 0 0 0 13px #334155;
}

.screen { display:none; position:absolute; inset:0; background:white; overflow-y:auto; }
.screen.active { display:block; }

</style>
</head>

<body>

<div class="phone-frame">
  <div class="screen active">
    <div style="padding:40px; text-align:center;">
      <h1>Zachet.KZ MVP</h1>
      <p>Файл успешно работает 🚀</p>
      <p>Теперь просто загрузи его в Netlify Drop</p>
    </div>
  </div>
</div>

</body>
</html>
